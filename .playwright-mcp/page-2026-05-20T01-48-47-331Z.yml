              - paragraph [ref=e1069]: Both iPhone 17 and iPhone Air have the same brilliant Super Retina XDR display technology with ProMotion with an adaptive refresh rate up to 120Hz, the new 18MP Center Stage front camera for incredible selfies, simultaneous front and rear video capture with Dual Capture, a durable Ceramic Shield 2 front with 3x better scratch resistance than iPhone 16, iOS, and Apple Intelligence with tools like visual intelligence.
              - paragraph [ref=e1070]: The key differences between iPhone 17 and iPhone Air are that iPhone 17 has a 48MP Fusion Ultra Wide camera and the A19 chip, compared with the A19 Pro chip in iPhone Air. iPhone Air has a 6.5-inch display, and iPhone 17 has a 6.3‑inch display. iPhone Air has a thinner, lighter titanium body. It also has Ceramic Shield on the back, which makes it 4x more resistant to cracks than iPhone 16, and it’s the thinnest iPhone ever — making it shockingly light, strong, and more durable than any previous iPhone.
